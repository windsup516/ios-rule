<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>风度安全 · 后台登录</title>
  <style>
    :root{--bg:#060b18;--surface:#0c1220;--border:rgba(0,240,255,.14);--accent:#00F0FF;--purple:#8B5CF6;--text:#e8f4ff;--dim:#7a8fab;--red:#f85149}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;padding:18px;overflow:hidden}
    body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(0,240,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,240,255,.025) 1px,transparent 1px);background-size:48px 48px}
    body:after{content:"";position:fixed;width:520px;height:520px;right:-180px;top:-190px;background:radial-gradient(circle,rgba(0,240,255,.12),transparent 65%)}
    .card{position:relative;z-index:1;width:100%;max-width:430px;background:rgba(12,18,32,.9);border:1px solid var(--border);border-radius:22px;padding:28px 24px;box-shadow:0 24px 70px rgba(0,0,0,.5);backdrop-filter:blur(18px)}
    .brand{text-align:center;margin-bottom:22px}.icon{width:58px;height:58px;border-radius:17px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(0,240,255,.14),rgba(139,92,246,.24));border:1px solid rgba(0,240,255,.32);font-size:28px}
    h1{font-size:18px;letter-spacing:.08em}.accent{color:var(--accent)}.sub{margin-top:6px;color:rgba(255,255,255,.28);font-size:11px;letter-spacing:.16em;text-transform:uppercase}
    .tabs{display:flex;gap:8px;margin-bottom:18px}.tab{flex:1;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--dim);border-radius:12px;padding:10px;font-weight:800;cursor:pointer}.tab.active{color:var(--accent);border-color:rgba(0,240,255,.35);background:rgba(0,240,255,.08)}
    .pane{display:none}.pane.active{display:block}
    label{display:block;color:var(--dim);font-size:12px;letter-spacing:.08em;margin:12px 0 6px}
    input,textarea{width:100%;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.045);color:var(--text);border-radius:12px;padding:12px 14px;outline:none;font-size:14px}
    textarea{min-height:76px;resize:vertical}
    input:focus,textarea:focus{border-color:rgba(0,240,255,.45);box-shadow:0 0 0 3px rgba(0,240,255,.08)}
    button.submit{width:100%;margin-top:18px;border:0;border-radius:12px;padding:13px;color:white;font-weight:900;background:linear-gradient(135deg,#00c8d8,#8B5CF6);cursor:pointer;box-shadow:0 12px 32px rgba(0,200,216,.2)}
    .alert{display:none;margin-top:14px;border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.5}
    .err{background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.25);color:#ffaaa5}.ok{background:rgba(0,240,255,.07);border:1px solid rgba(0,240,255,.22);color:#9df5ff}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="icon">🛡️</div>
      <h1><span class="accent">风度安全</span> · 发卡后台</h1>
      <div class="sub">FengDu Security Console</div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login',this)">管理员登录</button>
      <button class="tab" onclick="switchTab('apply',this)">申请账号</button>
    </div>

    <div id="pane-login" class="pane active">
      <label>后台账号</label>
      <input id="login-username" autocomplete="username" placeholder="请输入后台账号">
      <label>登录密码</label>
      <input id="login-password" type="password" autocomplete="current-password" placeholder="请输入后台密码">
      <button class="submit" onclick="doLogin()">进入后台</button>
      <div id="login-msg" class="alert"></div>
    </div>

    <div id="pane-apply" class="pane">
      <label>申请账号</label>
      <input id="apply-username" autocomplete="username" placeholder="建议填写邮箱/微信号/代理名">
      <label>登录密码</label>
      <input id="apply-password" type="password" autocomplete="new-password" placeholder="设置后台登录密码">
      <label>备注 / 联系方式</label>
      <textarea id="apply-note" placeholder="例如：代理A，微信xxxx，用于总管理员审核"></textarea>
      <button class="submit" onclick="doApply()">提交申请</button>
      <div id="apply-msg" class="alert"></div>
    </div>
  </div>

<script>
function switchTab(name, btn){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-'+name).classList.add('active');
}
function msg(id, text, ok=false){
  const el=document.getElementById(id); el.textContent=text; el.className='alert '+(ok?'ok':'err'); el.style.display='block';
}
async function doLogin(){
  const username=document.getElementById('login-username').value.trim();
  const password=document.getElementById('login-password').value;
  if(!username||!password){msg('login-msg','请输入账号和密码');return;}
  try{
    const r=await fetch('/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.detail||'登录失败');
    location.href=d.redirect||'/admin/dashboard';
  }catch(e){msg('login-msg',e.message||'登录失败');}
}
async function doApply(){
  const username=document.getElementById('apply-username').value.trim();
  const password=document.getElementById('apply-password').value;
  const note=document.getElementById('apply-note').value.trim();
  if(!username||!password){msg('apply-msg','请输入申请账号和密码');return;}
  try{
    const r=await fetch('/admin/apply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password,note})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.detail||'申请失败');
    msg('apply-msg',d.message||'申请已提交，请等待审核',true);
  }catch(e){msg('apply-msg',e.message||'申请失败');}
}
</script>
</body>
</html>
